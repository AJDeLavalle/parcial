<div class="detalle-card">
  <button type="button" class="close-btn" (click)="cerrar.emit()">✕ cerrar</button>
  <div class="header">
    <img [src]="usuario.avatarUrl" [alt]="usuario.name" class="avatar" />
    <div class="header-info">
      <h2 class="name">{{ usuario.name }}</h2>
      <span class="username">@{{ usuario.username }}</span>
      <span class="role-badge" [ngClass]="'role-' + usuario.role">{{ usuario.role }}</span>
    </div>
  </div>
  <div class="fields">
    <div class="field">
      <span class="label">// email</span>
      <span class="value">{{ usuario.email }}</span>
    </div>
    <div class="field">
      <span class="label">// location</span>
      <span class="value">{{ usuario.location }}</span>
    </div>
  </div>
  <div class="repos-section">
    <div class="repos-header">
      <span class="label">// repositorios ({{ repos.length }})</span>
      <button *ngIf="repos.length > 0" type="button" class="ver-repos-btn" (click)="verReposUsuario()">
        ver en lista →
      </button>
    </div>
    <div class="repos-list">
      <div *ngFor="let r of repos" class="repo-item" (click)="verReposUsuario()">
        <span class="repo-name">{{ r.name }}</span>
        <span class="lang-badge">{{ r.language }}</span>
        <span class="stars">⭐ {{ r.stars }}</span>
      </div>
      <span *ngIf="repos.length === 0" class="empty">sin repositorios</span>
    </div>
  </div>
</div>
